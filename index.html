
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Principal Unificado - IJK Mobile Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#15152f;--muted:#6d7190;--primary:#7458ff;--accent:#ec4899;--cyan:#61d7ff;--card:rgba(255,255,255,.68);--stroke:rgba(255,255,255,.76);--shadow:0 28px 70px rgba(87,77,190,.18);--shadow-soft:0 18px 45px rgba(17,24,39,.08);--radius:30px}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Plus Jakarta Sans','Inter','Manrope',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:radial-gradient(circle at 11% 4%,rgba(255,185,247,.58),transparent 30%),radial-gradient(circle at 90% 2%,rgba(174,222,255,.80),transparent 35%),radial-gradient(circle at 18% 90%,rgba(210,187,255,.62),transparent 35%),linear-gradient(135deg,#fdfcff 0%,#f8f6ff 38%,#eef8ff 100%);overflow-x:hidden}
    body::before,body::after{content:"";position:fixed;width:420px;height:420px;border-radius:999px;filter:blur(12px);opacity:.45;pointer-events:none;z-index:0}
    body::before{left:-170px;top:110px;background:radial-gradient(circle,rgba(121,88,255,.28),transparent 68%)}
    body::after{right:-160px;bottom:-100px;background:radial-gradient(circle,rgba(93,210,255,.35),transparent 68%)}
    .app{position:relative;z-index:1;width:min(1500px,calc(100% - 32px));margin:0 auto;padding:28px 0 42px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:22px;padding:16px 18px;border:1px solid var(--stroke);background:rgba(255,255,255,.62);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:28px;box-shadow:var(--shadow-soft)}
    .brand{display:flex;align-items:center;gap:18px;min-width:0}
    .brand-logo{width:300px;height:118px;flex:0 0 auto;border-radius:22px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.95);box-shadow:0 18px 42px rgba(87,77,190,.10);overflow:hidden;padding:6px 10px}
    .brand-logo img{width:100%;height:100%;object-fit:contain;display:block;transform:scale(1.12)}
    .brand-title strong{display:block;font-family:'Manrope','Inter',sans-serif;font-size:22px;letter-spacing:-.055em;line-height:1.05}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 13px;border:1px solid rgba(255,255,255,.74);background:rgba(255,255,255,.66);backdrop-filter:blur(18px);border-radius:999px;color:#4b5563;font-size:13px;font-weight:800;white-space:nowrap;box-shadow:0 12px 30px rgba(17,24,39,.05)}
    .hero{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.78);background:linear-gradient(145deg,rgba(255,255,255,.82),rgba(255,255,255,.48));backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);border-radius:38px;padding:34px;box-shadow:var(--shadow);margin-bottom:22px}
    .hero::after{content:"";position:absolute;width:480px;height:235px;border-radius:999px;right:-110px;top:-92px;background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(236,72,153,.15),rgba(56,189,248,.16));filter:blur(11px)}
    .hero-content{position:relative;z-index:1}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;color:#5b21b6;background:rgba(124,58,237,.10);border:1px solid rgba(124,58,237,.14);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
    h1{margin:0;max-width:1040px;font-family:'Manrope','Inter',sans-serif;font-size:clamp(34px,5vw,64px);line-height:.98;letter-spacing:-.075em;font-weight:900}
    .gradient-text{background:linear-gradient(90deg,#6d28d9,#4f46e5,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero p{margin:16px 0 0;max-width:850px;color:var(--muted);font-size:16px;line-height:1.7;font-weight:650}
    .hero-buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
    .btn{min-height:48px;border:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:13px 18px;border-radius:18px;font-family:inherit;font-weight:900;transition:.18s ease;text-decoration:none;color:inherit;user-select:none}
    .btn:hover{transform:translateY(-2px)}
    .btn-primary{color:#fff;background:linear-gradient(135deg,#7458ff 0%,#9b5cff 52%,#57c6ff 100%);box-shadow:0 18px 38px rgba(116,88,255,.28)}
    .btn-soft{color:#352f82;background:rgba(255,255,255,.70);border:1px solid rgba(137,131,206,.22);box-shadow:0 14px 30px rgba(86,79,170,.08)}
    .workspace{border:1px solid var(--stroke);background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:var(--radius);box-shadow:var(--shadow-soft);min-height:840px;overflow:hidden}
    .workspace-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:20px 22px;border-bottom:1px solid rgba(116,88,255,.12);background:rgba(255,255,255,.34)}
    .workspace-title{display:flex;align-items:center;gap:12px;min-width:0}
    .workspace-title .icon{width:46px;height:46px;border-radius:17px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,#7458ff,#4f46e5 55%,#61d7ff);box-shadow:0 16px 34px rgba(79,70,229,.22);font-size:22px;flex:0 0 auto}
    .workspace-title h2{margin:0;font-family:'Manrope','Inter',sans-serif;font-size:22px;letter-spacing:-.055em;line-height:1.05}
    .workspace-title p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:750}
    .workspace-tools{display:flex;align-items:center;justify-content:flex-end;gap:14px;flex-wrap:wrap;flex:1}
    .search-box{position:relative;width:min(420px,100%);min-width:320px}
    .search-box input{width:100%;min-height:46px;border:1px solid rgba(124,58,237,.15);background:rgba(255,255,255,.72);color:var(--ink);padding:0 44px 0 15px;border-radius:18px;outline:none;font:inherit;font-weight:750;box-shadow:0 12px 28px rgba(86,79,170,.06)}
    .search-box span{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:#8a8fad;font-size:18px}
    .workspace-actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}
    .workspace-body{padding:18px}
    .module-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .module-card{border:1px solid rgba(255,255,255,.72);background:rgba(255,255,255,.56);border-radius:26px;padding:18px;box-shadow:0 14px 34px rgba(86,79,170,.08);transition:.18s ease}
    .module-card:hover{transform:translateY(-2px);background:rgba(255,255,255,.78);border-color:rgba(116,88,255,.24)}
    .module-icon{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;background:rgba(124,58,237,.10);color:#5b21b6;font-size:22px;margin-bottom:13px}
    .module-card h3{margin:0;font-family:'Manrope','Inter',sans-serif;font-size:18px;letter-spacing:-.045em}
    .module-card p{margin:8px 0 16px;color:var(--muted);line-height:1.55;font-size:13px;font-weight:650}
    .iframe-wrap{border:1px solid rgba(255,255,255,.78);background:rgba(255,255,255,.50);border-radius:26px;overflow:hidden;box-shadow:0 14px 34px rgba(86,79,170,.08)}
    #moduleFrame{width:100%;height:82vh;min-height:820px;border:0;display:block;background:white}
    .toast{position:fixed;left:50%;top:20px;transform:translateX(-50%) translateY(-20px);opacity:0;pointer-events:none;z-index:50;color:#fff;background:linear-gradient(135deg,#7458ff,#4f46e5,#ec4899);padding:12px 18px;border-radius:999px;font-weight:900;box-shadow:0 18px 38px rgba(116,88,255,.28);transition:.22s ease}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:1100px){.module-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:720px){.app{width:min(100% - 22px,1500px);padding-top:14px}.topbar{align-items:flex-start;flex-direction:column}.brand-logo{width:230px;height:92px}.hero{padding:24px;border-radius:30px}.module-grid{grid-template-columns:1fr}.workspace-head{align-items:flex-start;flex-direction:column}.workspace-tools{width:100%;justify-content:flex-start}.search-box{width:100%;min-width:0}.workspace-actions{justify-content:flex-start}#moduleFrame{height:78vh;min-height:700px}}
    @media print{body{background:#fff;padding:0}body::before,body::after,.topbar,.hero,.workspace-actions,.search-box{display:none!important}.app{width:100%;padding:0}.workspace{border:0;box-shadow:none;border-radius:0;background:#fff}.workspace-head{border-bottom:1px solid #e5e7eb;background:#fff}#moduleFrame{height:100vh;min-height:100vh}}
  </style>
</head>

  <script>
    const DATA = JSON.parse(document.getElementById('dashboardData').textContent);
    const modules = DATA.modules;
    const htmlsB64 = DATA.htmls_b64;
    let activeModule = null;
    let activeObjectUrl = null;

    const workspaceBody = document.getElementById('workspaceBody');
    const workspaceIcon = document.getElementById('workspaceIcon');
    const workspaceName = document.getElementById('workspaceName');
    const workspaceDesc = document.getElementById('workspaceDesc');
    const toast = document.getElementById('toast');

    function decodeHtml(id) {
      const encoded = htmlsB64[id] || '';
      try {
        const binary = atob(encoded);
        const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
        return new TextDecoder('utf-8').decode(bytes);
      } catch (err) {
        console.error('No se pudo decodificar el módulo', id, err);
        return '<!doctype html><html><body><h1>Error cargando módulo</h1></body></html>';
      }
    }

    function getHtmlForModule(id) {
      return decodeHtml(id);
    }

    function renderCards(){
      workspaceBody.innerHTML = `<div class="module-grid">${modules.map(m => `
        <article class="module-card" data-module-name="${(m.name + ' ' + m.desc + ' ' + m.category).toLowerCase()}">
          <div class="module-icon">${m.icon}</div>
          <h3>${m.name}</h3>
          <p>${m.desc}</p>
          <button class="btn btn-soft" onclick="openModule('${m.id}')">Abrir módulo</button>
        </article>
      `).join('')}</div>`;
      filterCards();
    }

    function openHome(){
      activeModule = null;
      workspaceIcon.textContent = '🏠';
      workspaceName.textContent = 'Inicio';
      workspaceDesc.textContent = 'Selecciona un módulo para empezar.';
      if(activeObjectUrl) {
        URL.revokeObjectURL(activeObjectUrl);
        activeObjectUrl = null;
      }
      renderCards();
    }

    function openModule(id){
      const selected = modules.find(m => m.id === id);
      if(!selected) return;
      activeModule = id;
      workspaceIcon.textContent = selected.icon;
      workspaceName.textContent = selected.name;
      workspaceDesc.textContent = selected.desc;
      workspaceBody.innerHTML = `<div class="iframe-wrap"><iframe id="moduleFrame" title="${selected.name}" allow="clipboard-read; clipboard-write"></iframe></div>`;
      const frame = document.getElementById('moduleFrame');
      if(activeObjectUrl) URL.revokeObjectURL(activeObjectUrl);
      const html = getHtmlForModule(id);
      activeObjectUrl = URL.createObjectURL(new Blob([html], { type: 'text/html;charset=utf-8' }));
      frame.src = activeObjectUrl;
      showToast(`Módulo abierto: ${selected.name}`);
    }

    function reloadCurrent(){
      if(activeModule) openModule(activeModule);
      else openHome();
    }

    function printCurrent(){
      const frame = document.getElementById('moduleFrame');
      if(frame && frame.contentWindow) frame.contentWindow.print();
      else window.print();
    }

    function filterCards(){
      const q = (document.getElementById('moduleSearch').value || '').trim().toLowerCase();
      document.querySelectorAll('.module-card').forEach(card => {
        card.style.display = (card.dataset.moduleName || '').includes(q) ? '' : 'none';
      });
    }

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function setDateChip(){
      document.getElementById('todayChip').textContent = new Date().toLocaleDateString('es-PE', {weekday:'long', day:'2-digit', month:'long'});
    }

    setDateChip();
    openHome();
  </script>
</body>
</html>
